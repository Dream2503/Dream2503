name: Generate README Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Generate GitHub Stats
        run: |
          mkdir -p assets

          curl -o assets/github-stats.svg \
          "https://github-readme-stats.vercel.app/api?username=Dream2503&show_icons=true&theme=dark&cache_seconds=21600"

          curl -o assets/top-langs.svg \
          "https://github-readme-stats.vercel.app/api/top-langs/?username=Dream2503&layout=compact&langs_count=8&theme=dark&hide=Jupyter%20Notebook&cache_seconds=21600"

          curl -o assets/wakatime.svg \
          "https://github-readme-stats.vercel.app/api/wakatime?username=dream2503&layout=compact&langs_count=10&theme=dark&cache_seconds=21600"

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/*.svg
          git commit -m "Update README stats" || echo "No changes to commit"
          git push
